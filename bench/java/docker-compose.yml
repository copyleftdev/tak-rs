# Java upstream TAK Server bench harness.
#
# Builds the upstream takserver from .scratch/takserver-java/ via a
# multi-stage Dockerfile, runs it against a postgis sidecar, exposes:
#
#   - 8087   plain TCP CoT input
#   - 8088   streaming TCP CoT input  (the bench target)
#   - 8443   HTTPS API (unused by bench; required by messaging service)
#
# Used by: scripts/bench-java-baseline.sh
# Issue:   https://github.com/copyleftdev/tak-rs/issues/37 (M5)

version: '3.8'

services:
  tak-database:
    image: postgis/postgis:15-3.3
    environment:
      POSTGRES_DB: cot
      POSTGRES_USER: martiuser
      POSTGRES_PASSWORD: bench-only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U martiuser -d cot"]
      interval: 2s
      timeout: 2s
      retries: 30
    networks:
      - taknet

  tak-server:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      POSTGRES_DB: cot
      POSTGRES_USER: martiuser
      POSTGRES_PASSWORD: bench-only
      POSTGRES_URL: jdbc:postgresql://tak-database:5432/cot
      CA_NAME: tak-bench-ca
      CA_PASS: atakatak
      STATE: VA
      CITY: Reston
      ORGANIZATION: tak-rs-bench
      ORGANIZATIONAL_UNIT: bench
      ADMIN_CERT_NAME: admin
      ADMIN_CERT_PASS: atakatak
      TAKSERVER_CERT_PASS: atakatak
    depends_on:
      tak-database:
        condition: service_healthy
    ports:
      - '127.0.0.1:8087:8087'
      - '127.0.0.1:8088:8088'
      - '127.0.0.1:8443:8443'
    networks:
      - taknet

networks:
  taknet:
