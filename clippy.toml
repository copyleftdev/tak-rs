# clippy thresholds — see CLAUDE.md and docs/invariants.md for the rules these support.
# Lint enable/disable lives in workspace Cargo.toml under [workspace.lints.clippy] and
# in per-crate lib.rs via #![deny(...)] / #![warn(...)].

# We're pre-1.0; freedom to break the API outweighs strict semver linting.
avoid-breaking-exported-api = false

# Cap complexity. If a function trips this, refactor — it's almost always doing too much.
cognitive-complexity-threshold = 25
type-complexity-threshold = 250
too-many-arguments-threshold = 7
too-many-lines-threshold = 200

# Discourage stringly-typed APIs.
single-char-binding-names-threshold = 4
trivial-copy-size-limit = 16

# Match exhaustiveness — non-exhaustive enums are noise unless we genuinely add variants.
enum-variant-name-threshold = 3

# Documentation
missing-docs-in-crate-items = false  # tighten to true once each crate's lib.rs has docs

# Disallow these methods globally — bypass observability or perf invariants.
disallowed-methods = [
    { path = "std::sync::Mutex::new", reason = "use parking_lot::Mutex on hot paths; std::sync::Mutex only on cold paths and document why" },
    { path = "tokio::spawn", reason = "use tak_server::tasks::spawn for named, traced, time-bounded tasks (invariant N3)" },
]

# Disallow these types in lib code. This catches DIRECT use; transitive
# pulls of chrono/time/lazy_static (unavoidable via sqlx, x509-parser, etc.)
# are not flagged here — that's the right division of labor.
# `allow-invalid` lets us list paths that may not be in scope today (they
# come into scope only if someone adds the offending crate as a direct dep).
disallowed-types = [
    { path = "std::time::SystemTime",   reason = "use jiff::Timestamp (invariant D3)" },
    { path = "chrono::DateTime",        reason = "use jiff (invariant D3)", allow-invalid = true },
    { path = "chrono::NaiveDateTime",   reason = "use jiff (invariant D3)", allow-invalid = true },
    { path = "time::OffsetDateTime",    reason = "use jiff (invariant D3)", allow-invalid = true },
    { path = "time::PrimitiveDateTime", reason = "use jiff (invariant D3)", allow-invalid = true },
]

# `lazy_static!` is a macro, not a type — clippy gates these separately.
disallowed-macros = [
    { path = "lazy_static::lazy_static", reason = "use std::sync::OnceLock or LazyLock", allow-invalid = true },
]
