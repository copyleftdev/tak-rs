[package]
name         = "tak-proto"
description  = "Vendored TAK Protocol v1 protobuf types (generated from upstream)."
version      .workspace = true
edition      .workspace = true
rust-version .workspace = true
license      .workspace = true
authors      .workspace = true
repository   .workspace = true

[dependencies]
prost  .workspace = true
bytes  .workspace = true   # required at runtime by code generated with `config.bytes(["."])`

[build-dependencies]
prost-build         .workspace = true
protoc-bin-vendored .workspace = true

# tak-proto is generated code; pedantic lints don't apply.
[lints]

# bytes is referenced only by code in OUT_DIR (generated by build.rs);
# machete can't see those refs, so mark it ignored explicitly.
[package.metadata.cargo-machete]
ignored = ["bytes"]
