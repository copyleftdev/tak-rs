# cargo-deny config — enforces the dep policy from CLAUDE.md and docs/invariants.md.
# Run: `cargo deny check` (advisories, bans, licenses, sources).
# Required-passing in CI; PostToolUse hook runs it whenever Cargo.toml changes.

[graph]
# We support stable Rust on Linux x86_64 / aarch64 + macOS aarch64 for dev.
targets = [
    "x86_64-unknown-linux-gnu",
    "aarch64-unknown-linux-gnu",
    "aarch64-apple-darwin",
]
all-features = false
no-default-features = false

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories — vulnerability database.
# Vulnerabilities + yanked = deny. Unmaintained = warn (we track but don't
# fail builds on transitive crates we can't upgrade unilaterally).
# ---------------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    # time 0.3.45 DoS via stack exhaustion. Pulled in transitively by
    # x509-parser→der-parser→asn1-rs (which pins old time). Cannot upgrade
    # unilaterally. Remove once x509-parser bumps to time >= 0.3.47.
    # Risk: tak-rs only parses time fields from peer certs already verified
    # by rustls; no untrusted-input path reaches this code.
    "RUSTSEC-2026-0009",

    # tokio-tar PAX header smuggling vuln. Pulled in TEST-ONLY by
    # testcontainers → bollard (Docker client). tokio-tar is the
    # tarball client used to copy files into a Docker container during
    # test setup. Not reachable from production code; only the test
    # binary touches it.
    # Risk: test-only; the tar files are ones we construct ourselves
    # to seed test containers, not attacker-controlled.
    "RUSTSEC-2025-0111",

    # rustls-pemfile unmaintained. Pulled in TEST-ONLY transitively by
    # testcontainers → bollard → hyper-rustls. We dropped our direct
    # dep on it (#16); test-only path doesn't matter.
    "RUSTSEC-2025-0134",

    # paste v1.0.15 unmaintained (archived by author). Pulled in
    # transitively by compio-driver → compio. compio is gated behind
    # `tak-server --compio` (Linux-only opt-in firehose runtime); the
    # default tokio path does not touch it. `paste` is a proc-macro
    # crate that runs at build time only; it does not ship in the
    # binary and has no runtime input surface. Drop this ignore when
    # compio migrates to `pastey` (tracked upstream:
    # https://github.com/compio-rs/compio).
    "RUSTSEC-2024-0436",
]

# ---------------------------------------------------------------------------
# Licenses — only OSI-approved permissive + MPL-2.0 + Unicode-3.0.
# ---------------------------------------------------------------------------
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "CDLA-Permissive-2.0",   # webpki-roots (Linux Foundation data license; MIT-equivalent)
    "OpenSSL",               # ring (boringssl-derived)
]
confidence-threshold = 0.93
exceptions = []

# ---------------------------------------------------------------------------
# Bans — the heart of our dep policy. See docs/invariants.md D3-D5.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"      # tighten to "deny" once we stabilize
wildcards = "deny"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"

# Bans here = "do not appear in the dep tree at all" (direct or transitive).
# This list is intentionally small. Direct-dep policy (no chrono/time/log/
# lazy_static in OUR Cargo.toml) is enforced by clippy::disallowed-types
# (clippy.toml), the post-edit-cargo hook, and review — not cargo-deny —
# because those crates are unavoidable transitively.
deny = [
    # TLS — we use rustls. These should never be transitive in our tree.
    { name = "openssl",     reason = "use rustls (invariant D4)" },
    { name = "openssl-sys", reason = "use rustls (invariant D4)" },
    { name = "native-tls",  reason = "use rustls (invariant D4)" },

    # Alternative log frameworks (tracing-log bridges plain `log` for us).
    { name = "env_logger", reason = "use tracing-subscriber (invariant D5)" },
    { name = "slog",       reason = "use tracing (invariant D5)" },
    { name = "log4rs",     reason = "use tracing (invariant D5)" },

    # Alternative runtimes — tokio only.
    { name = "async-std", reason = "use tokio (invariant: single runtime)" },
    { name = "smol",      reason = "use tokio" },

    # XML — quick-xml only (decision: docs/decisions/0001-codec-parser.md).
    { name = "xml-rs",    reason = "use quick-xml" },
    { name = "roxmltree", reason = "lost the parser shootout 3.3-4.1× to quick-xml; see docs/decisions/0001-codec-parser.md" },
]

# multiple-versions skips for crates we accept being pinned-elsewhere by
# transitive deps. Add only when noisy.
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources — only crates.io + a small allowlist of git deps.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []

[sources.allow-org]
github = []
