[plugin]
name = "geofence_redact"
enabled = true
priority = 100

[limits]
max-memory-mb = 32
# 5 ms / call covers our heartbeat path (every 1000 events the
# plugin formats a string and calls log::emit). Lowering this can
# cause false traps on busy boxes — see crates/tak-plugin-host/src/host.rs.
max-cpu-ms-per-msg = 5
max-rss-leak-mb = 0

[capabilities]
filesystem = []
network = []
plugin-config = '{ "drop_below_lat": 36.0 }'
