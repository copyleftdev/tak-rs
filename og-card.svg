    <line x1="0" y1="220" x2="700" y2="220" stroke="#5A6470" stroke-width="1"/>
  </g>

  <g transform="translate(60,560)"
     font-family="ui-monospace, SF Mono, Cascadia Mono, Menlo, Consolas, monospace"
     font-weight="500" font-size="15" letter-spacing="2.6"
     fill="#5A6470">
    <text x="0"   y="0">144 &#xB5;S P99</text>
    <text x="170" y="0">2.04 B FUZZ EXECS</text>
    <text x="400" y="0">0 ALLOCS / DISPATCH</text>
    <text x="650" y="0">148 / 148 TESTS</text>
    <text x="850" y="0">MIT &#xB7; APACHE-2.0</text>
